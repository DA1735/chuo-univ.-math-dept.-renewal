services:
  mariadb:
    image: mariadb:11
    container_name: chuo-math-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: chuo_math
      MARIADB_USER: chuo
      MARIADB_PASSWORD: chuopass
    ports:
      - "3308:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
